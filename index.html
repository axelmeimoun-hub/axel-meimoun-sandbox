<!--
  PREVIEWS: Place screenshot images in a /previews/ folder
  at the root of the repo, named exactly as referenced in PROJECTS array.
  Recommended size: 1280x720px (16:9)
  Format: PNG or JPG
-->
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Playground — axelmeimoun-hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400&family=Jost:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f7f5f2;
      --surface: #ffffff;
      --surface2: #f0ede8;
      --border: rgba(0,0,0,0.08);
      --border2: rgba(0,0,0,0.16);
      --text: #1a1916;
      --muted: #6b6860;
      --hint: #a8a49c;
      --accent: #1a1916;
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans: 'Jost', system-ui, sans-serif;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      font-family: var(--sans);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 32px;
      flex: 1;
    }

    header { margin-bottom: 48px; }

    .header-label {
      font-family: ui-monospace, 'SF Mono', 'Cascadia Code', monospace;
      font-size: 11px;
      color: var(--hint);
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .header-title {
      font-family: var(--serif);
      font-size: clamp(32px, 5vw, 52px);
      font-weight: 400;
      color: var(--text);
      margin-top: 4px;
      line-height: 1.1;
    }

    .header-subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-top: 8px;
      font-weight: 300;
    }

    .header-separator {
      border: none;
      border-top: 0.5px solid var(--border);
      margin-top: 32px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    @media (max-width: 1024px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr; }
      .container { padding: 32px 20px; }
    }

    .card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      color: inherit;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      border-color: var(--border2);
    }

    .card-preview {
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background: var(--surface2);
      position: relative;
    }

    .card-preview img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .card-preview-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      background: #e8e4dc;
      font-family: var(--serif);
      font-size: 40px; font-weight: 400;
      color: var(--muted); letter-spacing: 0.02em;
    }

    .card-body {
      padding: 16px 18px 18px;
      flex: 1; display: flex; flex-direction: column; gap: 8px;
    }

    .card-title { font-family: var(--serif); font-size: 18px; font-weight: 400; color: var(--text); line-height: 1.2; }

    .card-description {
      font-size: 13px; color: var(--muted); line-height: 1.6;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }

    .card-footer { margin-top: auto; padding-top: 12px; display: flex; justify-content: flex-end; }

    .card-footer-link { font-size: 12px; color: var(--hint); font-weight: 400; letter-spacing: 0.04em; transition: color 0.15s; }

    .card:hover .card-footer-link { color: var(--text); }

    footer { text-align: center; padding: 24px 32px 32px; font-size: 12px; color: var(--hint); letter-spacing: 0.04em; }
  </style>
</head>
<body>

<div class="container">
  <header>
    <div class="header-label">axelmeimoun-hub</div>
    <h1 class="header-title">Playground</h1>
    <p class="header-subtitle">Une collection de projets et outils interactifs</p>
    <hr class="header-separator" />
  </header>
  <main>
    <div class="grid" id="grid"></div>
  </main>
</div>

<footer>axelmeimoun-hub · GitHub Pages</footer>

        <line x1="234" y1="322" x2="262" y2="322" stroke="#c4bfb8" stroke-width="1" stroke-dasharray="4 4"/>

        <path d="M 320 55 L 322.4 60.8 L 328.6 61.2 L 323.8 65.2 L 325.3 71.3 L 320 68 L 314.7 71.3 L 316.2 65.2 L 311.4 61.2 L 317.6 60.8 Z" fill="none" stroke="#1a1916" stroke-width="0.9" stroke-linejoin="round"/>
        <text x="320" y="322" font-family="ui-monospace,monospace" font-size="8" fill="#a8a49c" text-anchor="middle" letter-spacing="2.5">COUPE DU MONDE · 2026</text>
      </svg>`
    }
    // Add more projects here as needed
  ];

  function renderCards() {
    const grid = document.getElementById('grid');
    PROJECTS.forEach(project => {
      const card = document.createElement('a');
      card.className = 'card';
      card.href = project.url;
      card.target = '_blank';
      card.rel = 'noopener noreferrer';
      const preview = document.createElement('div');
      preview.className = 'card-preview';
      if (project.previewSvg) {
        preview.innerHTML = project.previewSvg;
      } else {
        const img = document.createElement('img');
        img.alt = project.title;
        img.src = project.image;
        const placeholder = document.createElement('div');
        placeholder.className = 'card-preview-placeholder';
        placeholder.textContent = project.title.trim().charAt(0).toUpperCase();
        placeholder.style.display = 'none';
        img.addEventListener('error', () => { img.style.display = 'none'; placeholder.style.display = 'flex'; });
        preview.appendChild(img);
        preview.appendChild(placeholder);
      }
      const body = document.createElement('div');
      body.className = 'card-body';
      const title = document.createElement('div');
      title.className = 'card-title';
      title.textContent = project.title;
      const desc = document.createElement('div');
      desc.className = 'card-description';
      desc.textContent = project.description;
      const footer = document.createElement('div');
      footer.className = 'card-footer';
      const link = document.createElement('span');
      link.className = 'card-footer-link';
      link.textContent = 'Ouvrir →';
      footer.appendChild(link);
      body.appendChild(title);
      body.appendChild(desc);
      body.appendChild(footer);
      card.appendChild(preview);
      card.appendChild(body);
      grid.appendChild(card);
    });
  }

  renderCards();
</script>

</body>
</html>
